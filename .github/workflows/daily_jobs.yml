name: Daily Job Hunt

on:
  schedule:
    # Every day at 07:00 UTC = 09:00 Paris time (summer) / 08:00 winter
    - cron: '0 7 * * *'
  workflow_dispatch: {}  # Allow manual trigger from GitHub UI

jobs:
  hunt:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit seen_jobs.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job hunter
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_WEBHOOK_URL_2: ${{ secrets.DISCORD_WEBHOOK_URL_2 }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          FRANCE_TRAVAIL_CLIENT_ID: ${{ secrets.FRANCE_TRAVAIL_CLIENT_ID }}
          FRANCE_TRAVAIL_CLIENT_SECRET: ${{ secrets.FRANCE_TRAVAIL_CLIENT_SECRET }}
        run: python main.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "job-hunt-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
